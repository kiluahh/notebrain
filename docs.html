<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebrain — AI Agent inside your Obsidian notes</title>
<style>
/* ============================================================
   CSS Custom Properties
   ============================================================ */
:root {
  --bg-deep: #0a0a0f;
  --bg-card: rgba(255,255,255,0.03);
  --bg-card-hover: rgba(255,255,255,0.06);
  --bg-code: rgba(0,0,0,0.5);
  --bg-input: rgba(0,0,0,0.4);
  --border-subtle: rgba(0,245,255,0.1);
  --border-card: rgba(0,245,255,0.15);
  --border-hover: rgba(0,245,255,0.4);
  --text-primary: #e8e8ed;
  --text-secondary: rgba(255,255,255,0.65);
  --text-muted: rgba(255,255,255,0.4);
  --cyan: #00f5ff;
  --purple: #7b2ff7;
  --pink: #ff2d95;
  --green: #4ade80;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-mono: 'Consolas','Monaco','Courier New','Fira Code',monospace;
  --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans','Helvetica Neue',Arial,sans-serif;
  --max-content: 900px;
  --navbar-height: 56px;
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--navbar-height) + 20px); font-size: 16px; }
body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  position: relative;
}

/* ============================================================
   CRT Scanline Overlay
   ============================================================ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 1000;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.06) 2px,
    rgba(0,0,0,0.06) 4px
  );
}

	/* ============================================================
	   Three.js 3D Background
	   ============================================================ */
	#three-container {
	  position: fixed; inset: 0;
	  z-index: 0;
	}
	#three-container canvas {
	  display: block;
	  position: absolute;
	  top: 0; left: 0;
	  width: 100%; height: 100%;
	}
	#particle-canvas {
	  position: fixed; inset: 0;
	  z-index: 1;
	  pointer-events: none;
	}
	#glow {
	  position: fixed;
	  width: 300px; height: 300px;
	  border-radius: 50%;
	  background: radial-gradient(circle, rgba(0,245,255,0.1), transparent 70%);
	  pointer-events: none;
	  z-index: 1;
	  transform: translate(-50%, -50%);
	  opacity: 0;
	  transition: opacity 0.3s;
	}
	@keyframes glitch {
	  0% { clip-path: inset(40% 0 61% 0); transform: translate(-2px,2px); }
	  10% { clip-path: inset(92% 0 1% 0); transform: translate(1px,-3px); }
	  20% { clip-path: inset(43% 0 1% 0); transform: translate(-3px,1px); }
	  30% { clip-path: inset(25% 0 58% 0); transform: translate(3px,2px); }
	  40% { clip-path: inset(70% 0 10% 0); transform: translate(-2px,-2px); }
	  50% { clip-path: inset(5% 0 85% 0); transform: translate(0,3px); }
	  60% { clip-path: inset(80% 0 5% 0); transform: translate(2px,0); }
	  70% { clip-path: inset(30% 0 60% 0); transform: translate(-1px,-1px); }
	  80% { clip-path: inset(55% 0 30% 0); transform: translate(1px,2px); }
	  90% { clip-path: inset(15% 0 70% 0); transform: translate(-3px,0); }
	  100% { clip-path: inset(40% 0 61% 0); transform: translate(2px,-2px); }
	}
	.glitch-trigger { animation: glitch 0.3s ease-in-out; }
	@keyframes gradientShift {
	  0%,100% { background-position: 0% 50%; }
	  50% { background-position: 100% 50%; }
	}

/* ============================================================
   Typography
   ============================================================ */
a { color: var(--cyan); text-decoration: none; transition: color 0.2s, text-shadow 0.2s; }
a:hover { color: #fff; text-shadow: 0 0 12px rgba(0,245,255,0.5); }
img { max-width: 100%; display: block; }
code, pre { font-family: var(--font-mono); }
code {
  font-size: 0.9em;
  background: rgba(0,245,255,0.08);
  padding: 0.15em 0.45em;
  border-radius: 4px;
  color: var(--cyan);
  border: 1px solid rgba(0,245,255,0.15);
}
pre {
  overflow-x: auto;
  border-radius: var(--radius-md);
  background: var(--bg-code);
  padding: 1.3em 1.5em;
  line-height: 1.65;
  font-size: 0.87em;
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--cyan);
}
pre code {
  background: none;
  padding: 0;
  color: var(--text-primary);
  font-size: inherit;
  border: none;
}

h1 {
  font-size: 2.8em;
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 0.25em;
  letter-spacing: -0.02em;
}
h2 {
  font-size: 1.75em;
  font-weight: 700;
  margin-bottom: 0.6em;
  margin-top: 0;
  color: var(--text-primary);
  padding-bottom: 0.4em;
  border-bottom: 2px solid var(--border-subtle);
  position: relative;
}
h2::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 60px;
  height: 2px;
  background: var(--cyan);
}
h3 {
  font-size: 1.25em;
  font-weight: 600;
  margin-bottom: 0.5em;
  margin-top: 1.6em;
  color: var(--text-primary);
}
h4 {
  font-size: 1.05em;
  font-weight: 600;
  margin-bottom: 0.4em;
  margin-top: 1.3em;
  color: var(--text-secondary);
}
p { margin-bottom: 1em; color: var(--text-secondary); }
ul, ol { margin-bottom: 1em; padding-left: 1.5em; color: var(--text-secondary); }
li { margin-bottom: 0.4em; }
strong { color: var(--text-primary); font-weight: 600; }

/* ============================================================
   Navbar — Glass-morphism, sticky
   ============================================================ */
.navbar {
  position: sticky;
  top: 0;
  z-index: 999;
  width: 100%;
  height: var(--navbar-height);
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-card);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow 0.3s;
}
.navbar.scrolled {
  box-shadow: 0 0 30px rgba(0,245,255,0.08);
}
.navbar-inner {
  width: 100%;
  max-width: var(--max-content);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
}
.navbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 1.1em;
  color: var(--text-primary);
  text-decoration: none;
}
.navbar-brand:hover { color: var(--cyan); text-shadow: 0 0 12px rgba(0,245,255,0.3); }
.navbar-logo {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));
  background-size: 200% 200%;
  animation: gradientShift 4s ease-in-out infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 16px;
  color: #fff;
  font-family: var(--font-mono);
}
.navbar-version {
  font-size: 0.65em;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 2px;
}
.navbar-links {
  display: flex;
  align-items: center;
  gap: 4px;
  list-style: none;
  padding: 0;
  margin: 0;
}
.navbar-links li { margin: 0; }
.navbar-links a {
  display: block;
  padding: 6px 14px;
  font-size: 0.85em;
  font-weight: 500;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  border: 1px solid transparent;
  white-space: nowrap;
}
.navbar-links a:hover,
.navbar-links a.active {
  color: var(--cyan);
  background: rgba(0,245,255,0.06);
  border-color: var(--border-subtle);
}
.navbar-gh {
  padding: 6px 12px;
  font-size: 0.85em;
  font-weight: 500;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-card);
  transition: all 0.2s;
  white-space: nowrap;
  font-family: var(--font-mono);
}
.navbar-gh:hover {
  color: var(--cyan);
  border-color: var(--border-hover);
  background: rgba(0,245,255,0.06);
}

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 4px;
  cursor: pointer;
  padding: 8px;
  background: none;
  border: none;
  z-index: 1001;
}
.hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--text-primary);
  border-radius: 1px;
  transition: all 0.25s;
}
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4px,4px); background: var(--cyan); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px,-4px); background: var(--pink); }

/* Mobile menu overlay */
.mobile-menu {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 998;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.3s;
}
.mobile-menu.open {
  display: flex;
  opacity: 1;
}
.mobile-menu a {
  font-size: 1.05em;
  color: var(--text-secondary);
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  border: 1px solid transparent;
}
.mobile-menu a:hover,
.mobile-menu a.active {
  color: var(--cyan);
  background: rgba(0,245,255,0.06);
  border-color: var(--border-subtle);
}
.mobile-menu .mobile-gh {
  margin-top: 16px;
  font-family: var(--font-mono);
  border: 1px solid var(--border-card);
}

/* ============================================================
   Main Content — CENTERED
   ============================================================ */
.main-content {
  max-width: var(--max-content);
  margin: 0 auto;
  padding: 60px 24px 80px;
	  position: relative;
	  z-index: 2;
}

.section {
  margin-bottom: 80px;
}
.section:last-child { margin-bottom: 0; }

/* ============================================================
   Hero Section
   ============================================================ */
.hero {
  text-align: center;
  padding: 60px 0 50px;
  margin-bottom: 60px;
  animation: fadeInUp 0.8s ease-out;
}
.hero .badge-row {
  display: inline-block;
  padding: 4px 16px;
  border-radius: 20px;
  font-size: 0.78em;
  font-weight: 600;
  letter-spacing: 0.04em;
  background: rgba(0,245,255,0.07);
  color: var(--cyan);
  border: 1px solid var(--border-subtle);
  margin-bottom: 24px;
  font-family: var(--font-mono);
}
.hero h1 {
	  font-size: clamp(2.5em, 8vw, 4.2em);
	  font-weight: 900;
	  letter-spacing: 0.04em;
	  background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 35%, var(--pink) 65%, var(--cyan) 100%);
	  background-size: 300% 300%;
	  -webkit-background-clip: text;
	  -webkit-text-fill-color: transparent;
	  background-clip: text;
	  animation: gradientShift 4s ease-in-out infinite;
	  margin-bottom: 0.15em;
	  line-height: 1.1;
	  position: relative;
	}
	.hero h1::after {
	  content: "Notebrain";
	  position: absolute;
	  inset: 0;
	  background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 35%, var(--pink) 65%, var(--cyan) 100%);
	  background-size: 300% 300%;
	  -webkit-background-clip: text;
	  -webkit-text-fill-color: transparent;
	  background-clip: text;
	  animation: gradientShift 4s ease-in-out infinite;
	  z-index: -1;
	  filter: blur(18px) opacity(0.45);
	}
	.hero h1::before {
	  content: "";
	  position: absolute;
	  bottom: -2px;
	  left: 50%;
	  transform: translateX(-50%);
	  width: 60%;
	  height: 2px;
	  background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
	  border-radius: 2px;
	  filter: blur(1px);
	})();
	</script>

	<script>
	/* 2D Particle System */
	(function initParticles() {
	  var canvas = document.getElementById('particle-canvas');
	  var ctx = canvas.getContext('2d');
	  var w, h;
	  function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
	  resize();
	  window.addEventListener('resize', resize);
	  var particles = [], MAX = 55, mx = -999, my = -999;
	  function create(x, y) {
	    var a = Math.random() * Math.PI * 2;
	    var s = 0.2 + Math.random() * 0.6;
	    return { x:x, y:y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, decay:0.01+Math.random()*0.014, size:1.5+Math.random()*3, hue: Math.random()<0.5?185:270 };
	  }
	  document.addEventListener('mousemove', function(e) {
	    mx = e.clientX; my = e.clientY;
	    for (var i = 0; i < 3; i++) { if (particles.length < MAX) particles.push(create(mx+(Math.random()-0.5)*8, my+(Math.random()-0.5)*8)); }
	  });
	  function draw() {
	    ctx.clearRect(0, 0, w, h);
	    for (var i = 0; i < 40; i++) {
	      ctx.fillStyle = 'rgba(255,255,255,'+(0.015+Math.random()*0.03)+')';
	      ctx.beginPath();
	      ctx.arc((Math.sin(i*127.1+Date.now()*0.00008)+1)*w/2, (Math.cos(i*311.7+Date.now()*0.00006)+1)*h/2, 1+Math.random()*1.2, 0, Math.PI*2);
	      ctx.fill();
	    }
	    for (var i = particles.length-1; i >= 0; i--) {
	      var p = particles[i];
	      p.x += p.vx; p.y += p.vy;
	      p.vx *= 0.97; p.vy *= 0.97;
	      p.life -= p.decay;
	      if (p.life <= 0) { particles.splice(i,1); continue; }
	      ctx.save();
	      ctx.globalAlpha = p.life * 0.55;
	      ctx.shadowColor = p.hue === 185 ? '#00f5ff' : '#7b2ff7';
	      ctx.shadowBlur = 6;
	      ctx.fillStyle = 'hsl('+p.hue+',100%,70%)';
	      ctx.beginPath();
	      ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
	      ctx.fill();
	      ctx.restore();
	    }
	    requestAnimationFrame(draw);
	  }
	  draw();
	})();
	</script>

	<script>
	/* Mouse Glow */
	(function initGlow() {
	  var glow = document.getElementById('glow');
	  document.addEventListener('mousemove', function(e) {
	    glow.style.left = e.clientX + 'px';
	    glow.style.top = e.clientY + 'px';
	    glow.style.opacity = '1';
	  });
	  document.addEventListener('mouseleave', function() { glow.style.opacity = '0'; });
	})();
	</script>

	<script>
	/* Counter Animation */
	(function initCounters() {
	  var observer = new IntersectionObserver(function(entries) {
	    entries.forEach(function(entry) {
	      if (entry.isIntersecting) {
	        var el = entry.target;
	        var target = el.getAttribute('data-target');
	        if (!target || target === '∞') { observer.unobserve(el); return; }
	        var end = parseInt(target);
	        var dur = 1400;
	        var start = performance.now();
	        function update(now) {
	          var p = Math.min((now - start) / dur, 1);
	          var v = Math.floor(p < 1 ? (1 - Math.pow(2, -10 * p)) * end : end);
	          el.textContent = v;
	          if (p < 1) requestAnimationFrame(update);
	          else el.textContent = end;
	        }
	        requestAnimationFrame(update);
	        observer.unobserve(el);
	      }
	    });
	  }, { threshold: 0.5 });
	  document.querySelectorAll('.stat .number[data-target]').forEach(function(el) { observer.observe(el); });
	})();
	</script>

	<script>
	/* Title Glitch */
	(function initGlitch() {
	  var h1 = document.querySelector('.hero h1');
	  if (!h1) return;
	  h1.addEventListener('mouseenter', function() {
	    h1.classList.add('glitch-trigger');
	    setTimeout(function() { h1.classList.remove('glitch-trigger'); }, 350);
	  });
	})();
	</script>

	</body>
	</html>
